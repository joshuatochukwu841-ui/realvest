<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BOOTSTRAP CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- CSS-STYLES -->

    <!-- user-logiin -->
    <link rel="stylesheet" href="../CSS/user-login.css">
    <!-- layout -->
    <link rel="stylesheet" href="../CSS/layout.css">
    <!-- main -->
    <link rel="stylesheet" href="../CSS/main.css">

    <title>RealVest - Login</title>
</head>

<body>
    <!-- USER-LOGIN -->
    <section class="user-login bg-secondary  bg-opacity-10 py-5 ">
        <div class="container pb-5">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-10">
                    <div class="bg-white text-center px-4 px-md-5 pt-5 pb-3" style="border-radius: 12px;">
                        <a href="../pages/index.html" class="nav-brand pb-5 d-block">
                            <img src="../images/logo.png" alt="" style="width:190px ; height: 39px;">
                        </a>

                        <h4 class="pb-3">Account Login</h4>
                        <div class="social-handles row justify-content-center g-3 ">

                            <span class="col-md-4">
                                <a href="#" class="social-btn blue">
                                    <span class="social-img">
                                        <img src="../images/facebook.png" alt="">
                                    </span>
                                    Facebook
                                </a>
                            </span>

                            <span class="col-md-4">
                                <a href="#" class="social-btn orange">
                                    <span class="social-img">
                                        <img src="../images/google.png" alt="">
                                    </span>
                                    Google
                                </a>
                            </span>

                            <span class="col-md-4">
                                <a href="#" class="social-btn dark-blue">
                                    <span class="social-img">
                                        <img src="../images/linkedin.png" alt="">
                                    </span>
                                    Linkedin
                                </a>
                            </span>
                        </div>
                        <div class="d-block py-4">
                            <span class="text-center"
                                style="font-size: 13px;font-weight: 600; color:var(--text-color) ;">
                                OR
                            </span>
                        </div>

                        <form>
                            <label for="username" class="d-block">Username or Email <span>*</span></label>
                            <input type="text" name="text" id="text" required>

                            <label for="password" class="d-block">Password<span>*</span></label>
                            <input type="password" name="password" id="password" required>

                            <div class="checkbox d-flex align-items-center gap-3 col-md-8 col-sm-12">
                                <span class="box"></span>
                                <span style="font-size: 15px; font-weight: 600; color: var(--black);">I'm not a
                                    robot</span>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mt-4">
                                <span>
                                    <label for="checkbox" class="custom-checkbox  d-flex align-items-center">
                                        <input type="checkbox" name="checkbox" id="checkbox">
                                        <span class="checkmark">
                                        </span>
                                        Remember me
                                    </label>
                                </span>
                                <span>
                                    <a href="../pages/account-Recovery.html" class="reset-password">Forgot
                                        Password?</a>
                                </span>
                            </div>
                            <button class="btn login-btn my-3" type="submit">Login</button>
                            <p>Do you have an account? <a href="../pages/register.html"
                                    class="register-link">Register</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- END -->


    <!-- JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
</body>

</html>
