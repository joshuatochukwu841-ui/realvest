<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BOOTSTRAP CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- CSS-STYLES -->

    <!-- vendor-logiin -->
    <link rel="stylesheet" href="../CSS/vendor-login.css">
    <!-- layout
    <link rel="stylesheet" href="../CSS/layout.css"> -->
    <!-- main -->
    <link rel="stylesheet" href="../CSS/main.css">

    <title>RealVest - Login</title>
</head>

<body>
    <!-- VENDOR-LOGIN -->
    <section class="vendor-login bg-secondary  bg-opacity-10 pt-5 ">
        <div class="container pb-3">
            <div class="row justify-content-center">
                <a href="../pages/index.html" class="nav-brand pb-4 d-flex justify-content-center">
                    <img src="../images/logo.png" alt="">
                </a>
                <div class="col-lg-6 col-md-10">
                    <div class="bg-white px-4 px-md-5 pt-5 pb-3 rounded border">

                        <h4 class="pb-3">Account Login</h4>
                        <form>
                            <label for="username" class="d-block fw-medium">Username or Email <span>*</span></label>
                            <input type="text" name="text" id="text" value="vendor" required>

                            <label for="password" class="d-block">Password<span>*</span></label>
                            <input type="password" name="password" id="password" value="....." required>

                            <div class="checkbox d-flex align-items-center gap-3 col-md-8 col-sm-12">
                                <span class="box"></span>
                                <span style="font-size: 15px; font-weight: 500; color: #525f80;">I'm not a
                                    robot</span>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mt-5">
                                <span>
                                    <label for="checkbox" class="custom-checkbox  d-inline-flex align-items-center">
                                        <input type="checkbox" name="checkbox" id="checkbox">
                                        <span class="checkmark">
                                        </span>
                                        Keep me logged in
                                    </label>
                                </span>
                                <span>
                                    <a href="../pages/vendor-recovery.html" class="reset-password">Forgot
                                        Password?</a>
                                </span>
                            </div>
                            <button class="btn login-btn my-3" type="submit">Login Account</button>
                            <p>Don't have any account? 
                                <a href="../pages/vendor-register.html"
                                    class="new-account-link">Create Account
                                </a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- END -->


    <!-- JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
</body>

</html>
