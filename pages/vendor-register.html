<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BOOTSTRAP CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- CSS-STYLES -->
    <!-- register -->
    <link rel="stylesheet" href="../CSS/vendor-register.css">
    <!-- layout -->
    <link rel="stylesheet" href="../CSS/layout.css">
    <!-- main -->
    <link rel="stylesheet" href="../CSS/main.css">

    <title>RealVest - Register</title>
</head>

<body>
    <!-- VENDOR-REGISTER-SECTION -->
    <section class="vendor-register bg-secondary  bg-opacity-10 pt-5 ">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-10">
                    <a href="../pages/index.html" class="nav-brand pb-4 d-flex justify-content-center">
                        <img src="../images/logo.png" alt="">
                    </a>
                    <div class="bg-white px-4 px-md-5 pt-5 pb-3 rounded border">

                        <h4 class="pb-3">Create an Account</h4>
                        <form>
                            <div class="input-box d-flex gap-md-4 flex-column flex-sm-row">
                                <span style="width: 100%;">
                                    <label for="first-name" class="d-block">First Name <span>*</span></label>
                                    <input type="name" id="name" name="name" required>
                                </span>

                                <span style="width: 100%;">
                                    <label for="last name" class="d-block">Last Name <span>*</span></label>
                                    <input type="name" name="name" id="name" required>
                                </span>
                            </div>

                            <label for="email">Email <span>*</span></label>
                            <input type="email" name="email" id="email" required>

                            <div class="input-box d-flex gap-md-4 flex-column flex-sm-row">
                                <span style="width: 100%;">
                                    <label for="password" class="d-block">Password <span>*</span></label>
                                    <input type="password" name="password" id="password" required>
                                </span>

                                <span style="width: 100%;">
                                    <label for="password" class="d-block">Confirm Password <span>*</span></label>
                                    <input type="password" name="password" id="password" required>
                                </span>
                            </div>

                            <div class="checkbox d-flex align-items-center gap-3 col-md-8 col-sm-12">
                                <span class="box"></span>
                                <span style="font-size: 15px; font-weight: 600; color: var(--black);">I'm not a
                                    robot</span>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mt-4">
                                <label for="checkbox" class="custom-checkbox  d-inline-flex align-items-center"
                                    style="color: var(--text-color);">
                                    <input type="checkbox" name="checkbox" id="checkbox">
                                    <span class="checkmark">
                                    </span>
                                    I agree with <a href="../pages/privacy.html" target="_blank"
                                        class="terms-conditions">Privacy Policy</a> ,
                                    <a href="../pages/T&S.html" target="_blank" class="terms-conditions">Terms of
                                        Service </a>
                                </label>
                            </div>
                            <button class="btn submit-btn my-4" type="submit">Submit</button>
                            <p class="text-center">Already have an account? <a href="../pages/vendor-login.html" class="Login-link">Login</a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- END -->
</body>

</html>
