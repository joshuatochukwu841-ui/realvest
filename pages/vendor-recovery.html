<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BOOTSTRAP CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- CSS-STYLES -->
    <!-- account-recovery -->
    <link rel="stylesheet" href="../CSS/vendor-recovery.css">
    <!-- about -->
    <link rel="stylesheet" href="../CSS/about.css">
    <!-- layout -->
    <link rel="stylesheet" href="../CSS/layout.css">
    <!-- main -->
    <link rel="stylesheet" href="../CSS/main.css">

    <title>RealVest - Account Recovery</title>

</head>

<body>
    <main>
        <!-- VENDOR-RECOVERY-FORM -->
        <section class="vendor-recovery bg-secondary  bg-opacity-10 pt-4 ">
            <div class="container py-5">
                <div class="row justify-content-center">
                    <a href="../index.html" class="nav-brand pb-4 d-flex justify-content-center">
                        <img src="../images/logo.png" alt="">
                    </a>
                    <div class="col-lg-6 col-md-10">
                        <div class="bg-white  px-4 px-md-5 pt-5 pb-3 rounded border">
                            <h4 class="text-center">Account Recovery</h4>
                            <p class="pb-2">To recover your account please provide your email or username to find your
                                account.</p>

                            <form>
                                <label for="username" class="d-block">Username or Email <span>*</span></label>
                                <input type="text" name="text" id="text" required>

                                <div class="checkbox d-flex align-items-center gap-3 col-md-8 col-sm-12">
                                    <span class="box"></span>
                                    <span style="font-size: 15px; font-weight: 600; color: var(--black);">I'm not a
                                        robot</span>
                                </div>
                                <button class="btn submit-btn my-4" type="submit">Submit</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- END -->
    </main>
    <!-- JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>
</body>

<div class="rc-anchor-logo-img rc-anchor-logo-img-portrait"></div>
</html>
